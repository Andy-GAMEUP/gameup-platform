services:
  mongodb:
    image: mongo:7.0
    container_name: gameup-mongodb
    restart: unless-stopped
    command: mongod --wiredTigerCacheSizeGB 1
    volumes:
      - mongodb_data:/data/db
    networks:
      - gameup-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gameup-api
    restart: unless-stopped
    env_file:
      - .env.api
    volumes:
      - uploads_data:/app/apps/api/uploads
    networks:
      - gameup-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_UPLOADS_URL: ""
    container_name: gameup-web
    restart: unless-stopped
    env_file:
      - .env.web
    networks:
      - gameup-net
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: gameup-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - gameup-net
    depends_on:
      - web
      - api

volumes:
  mongodb_data:
  uploads_data:

networks:
  gameup-net:
    driver: bridge
