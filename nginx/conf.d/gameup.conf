# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name gameup.co.kr www.gameup.co.kr;

    location / {
        return 301 https://www.gameup.co.kr$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name gameup.co.kr www.gameup.co.kr;

    # gameup.co.kr → www 리다이렉트
    if ($host = 'gameup.co.kr') {
        return 301 https://www.gameup.co.kr$request_uri;
    }

    # SSL - Wildcard 인증서 (*.gameup.co.kr)
    ssl_certificate     /etc/nginx/certs/_wildcard_gameup_co_kr.crt;
    ssl_certificate_key /etc/nginx/certs/_wildcard_gameup_co_kr_SHA256WITHRSA.key;
    ssl_trusted_certificate /etc/nginx/certs/rsa-dv.chain-bundle.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API 프록시
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 파일 업로드 서빙 (캐싱 적용)
    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # WebSocket (Socket.io)
    location /socket.io/ {
        proxy_pass http://api:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Next.js 정적 자산 (장기 캐싱)
    location /_next/static/ {
        proxy_pass http://web:3000/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js 앱
    location / {
        proxy_pass http://web:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
